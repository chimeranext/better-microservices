# Cloud (Kubeflow/k8s) deployment of vision-core's gRPC + REST API.
# Batch crop-health sweeps + authoritative RF-DETR-Seg path. GPU-scheduled.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: vision-core
  namespace: vision-core
  labels:
    app.kubernetes.io/name: vision-core
    app.kubernetes.io/part-of: better-microservices
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: vision-core
  template:
    metadata:
      labels:
        app.kubernetes.io/name: vision-core
    spec:
      containers:
        - name: vision-core
          image: ghcr.io/chimeranext/vision-core:latest
          imagePullPolicy: IfNotPresent
          env:
            - name: VISION_TIER
              value: "cloud"
            - name: VISION_DEFAULT_FAMILY
              value: "rfdetr_seg"      # Apache-2.0; cloud accuracy default
            - name: VISION_INFERENCE_LOCAL
              value: "false"
            - name: VISION_KSERVE_URL
              value: "http://vision-core-rfdetr-seg.vision-core.svc.cluster.local"
          ports:
            - name: grpc
              containerPort: 50051
            - name: http
              containerPort: 8080
            - name: metrics
              containerPort: 9090
          resources:
            limits:
              nvidia.com/gpu: "1"
            requests:
              cpu: "500m"
              memory: 1Gi
          readinessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8080
            initialDelaySeconds: 20
---
apiVersion: v1
kind: Service
metadata:
  name: vision-core
  namespace: vision-core
spec:
  selector:
    app.kubernetes.io/name: vision-core
  ports:
    - name: grpc
      port: 50051
      targetPort: 50051
    - name: http
      port: 8080
      targetPort: 8080
