apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ .Release.Name }}-agentic-core
  labels:
    app: agentic-core
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      app: agentic-core
  template:
    metadata:
      labels:
        app: agentic-core
      annotations:
        prometheus.io/scrape: "true"
        prometheus.io/port: "{{ .Values.service.metrics.port }}"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
        fsGroup: 65534
      containers:
        - name: agentic-core
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8080
            - name: websocket
              containerPort: {{ .Values.service.websocket.port }}
            - name: grpc
              containerPort: {{ .Values.service.grpc.port }}
            - name: metrics
              containerPort: {{ .Values.service.metrics.port }}
          env:
            {{- range $key, $value := .Values.env }}
            - name: {{ $key }}
              value: {{ $value | quote }}
            {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          securityContext:
            readOnlyRootFilesystem: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
{{- if .Values.inference.vllm.enabled }}
        - name: vllm
          image: "{{ .Values.inference.vllm.image.repository }}:{{ .Values.inference.vllm.image.tag }}"
          imagePullPolicy: IfNotPresent
          ports:
            - name: vllm-api
              containerPort: {{ .Values.inference.vllm.port }}
          args:
            - "--host"
            - "127.0.0.1"
            - "--port"
            - "{{ .Values.inference.vllm.port }}"
            - "--model"
            - "{{ .Values.inference.vllm.model }}"
            {{- if .Values.inference.vllm.extraArgs }}
            {{- range .Values.inference.vllm.extraArgs }}
            - "{{ . }}"
            {{- end }}
            {{- end }}
          env:
            - name: CUDA_VISIBLE_DEVICES
              value: "{{ .Values.inference.vllm.env.CUDA_VISIBLE_DEVICES }}"
          resources:
            requests:
              cpu: {{ .Values.inference.vllm.resources.requests.cpu }}
              memory: {{ .Values.inference.vllm.resources.requests.memory }}
              {{- if .Values.inference.vllm.gpu.enabled }}
              nvidia.com/gpu: {{ .Values.inference.vllm.gpu.count }}
              {{- end }}
            limits:
              cpu: {{ .Values.inference.vllm.resources.limits.cpu }}
              memory: {{ .Values.inference.vllm.resources.limits.memory }}
              {{- if .Values.inference.vllm.gpu.enabled }}
              nvidia.com/gpu: {{ .Values.inference.vllm.gpu.count }}
              {{- end }}
          readinessProbe:
            httpGet:
              path: /health
              port: {{ .Values.inference.vllm.port }}
            initialDelaySeconds: 120
            periodSeconds: 30
            failureThreshold: 6
          securityContext:
            runAsNonRoot: true
            allowPrivilegeEscalation: false
            capabilities:
              drop: ["ALL"]
{{- end }}
