# =============================================================================
# Material for MkDocs — better-microservices
# Monorepo de microservicios source-available, seleccionables de forma independiente
# Una pestaña por servicio + Common (material transversal)
# =============================================================================

site_name: better-microservices
site_description: "Monorepo de microservicios source-available — una pestaña por servicio + Common"
site_url: https://chimeranext.github.io/better-microservices/
repo_url: https://github.com/chimeranext/better-microservices
repo_name: chimeranext/better-microservices
edit_uri: edit/main/docs/site/content/

docs_dir: content
site_dir: site

# Las páginas de cada servicio se enlazan por symlink desde
# services/<name>/docs/ — MkDocs sigue los symlinks al construir.

# Excluir ruido del subárbol de cada servicio que NO debe publicarse:
#  - sitios MkDocs ya construidos (HTML/JSON) que viven dentro de los docs;
#  - el mkdocs.yml propio de cada servicio (su sitio individual);
#  - symlinks rotos/duplicados heredados del repo (specs/superpowers en
#    agentic-core apunta a rutas locales absolutas inexistentes);
#  - metadatos de otras herramientas (myst.yml).
exclude_docs: |
  agentic-core/site/site/
  agentic-core/site/mkdocs.yml
  agentic-core/specs/myst.yml
  agentic-core/specs/superpowers/
  payments-core/requirements.txt
  payments-core/mkdocs.yml
  # El análisis del bus de eventos está duplicado byte-a-byte en 5 servicios;
  # se publica una sola vez en Common (content/common/eventbus-broker-analysis.md).
  agentic-core/architecture/eventbus-broker-analysis.md
  compliance-core/architecture/eventbus-broker-analysis.md
  invoice-core/architecture/eventbus-broker-analysis.md
  marketplace-core/architecture/eventbus-broker-analysis.md
  payments-core/architecture/eventbus-broker-analysis.md

# =============================================================================
# Theme Configuration
# =============================================================================
theme:
  name: material
  language: es
  palette:
    - scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Cambiar a modo oscuro
    - scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Cambiar a modo claro
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.top
    - navigation.indexes
    - search.highlight
    - search.share
    - search.suggest
    - content.code.copy
    - content.code.annotate
    - content.tabs.link
    - content.action.edit
    - content.action.view
    - toc.follow
  icon:
    repo: fontawesome/brands/github
    edit: material/pencil
    view: material/eye

# =============================================================================
# Plugins
# =============================================================================
plugins:
  - search:
      lang: es
  # Optional plugins — require pip install -r requirements.txt
  # GitHub Actions workflow installs all deps automatically.
  # - mermaid2:
  #     version: 11.4.1
  #     theme: base
  # - git-revision-date-localized:
  #     enable_creation_date: true
  # - minify:
  #     minify_html: true

# =============================================================================
# Markdown Extensions
# =============================================================================
markdown_extensions:
  - abbr
  - admonition
  - attr_list
  - def_list
  - footnotes
  - md_in_html
  - tables
  - toc:
      permalink: true
      title: En esta página
  - pymdownx.arithmatex:
      generic: true
  - pymdownx.betterem:
      smart_enable: all
  - pymdownx.caret
  - pymdownx.critic
  - pymdownx.details
  - pymdownx.emoji:
      emoji_generator: !!python/name:material.extensions.emoji.to_svg
      emoji_index: !!python/name:material.extensions.emoji.twemoji
  - pymdownx.highlight:
      anchor_linenums: true
      line_spans: __span
      pygments_lang_class: true
  - pymdownx.inlinehilite
  - pymdownx.keys
  - pymdownx.magiclink:
      normalize_issue_symbols: true
      repo_url_shorthand: true
      user: chimeranext
      repo: better-microservices
  - pymdownx.mark
  - pymdownx.smartsymbols
  - pymdownx.tabbed:
      alternate_style: true
      combine_header_slug: true
      slugify: !!python/object/apply:pymdownx.slugs.slugify
        kwds:
          case: lower
  - pymdownx.tasklist:
      custom_checkbox: true
  - pymdownx.tilde
  - pymdownx.superfences:
      custom_fences:
        - name: mermaid
          class: mermaid
          format: !!python/name:pymdownx.superfences.fence_code_format

